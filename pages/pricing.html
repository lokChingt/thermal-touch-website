<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../asssets/css/styles.css">
    <title>Thermal Touch</title>
</head>
<body>
    <header class="header-container">
        <div class="logo">
            <a href="../index.html"><img id=logo src="../asssets/images/logo.png" alt="logo"></a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">&#9776;</button>
        <nav class="navbar">
            <ul class="menu">
                <li class="menu-item"><a href="../index.html">Home</a></li>
                <li class="menu-item"><a href="products.html">Products</a></li>
                <li class="menu-item"><a href="pricing.html">Pricing</a></li>
                <!-- <li class="menu-item"><a href="pages/contact.html">Contact</a></li> -->
            </ul>
        </nav>
    </header>

    <div class="product-container grid">
        <div class="product">
            <img src="../asssets/images/heat_patch.png" class="heat-patch-img" alt="heat-patch">
            <h3>Heat Patch</h3>
            <div class="option-container">
                <div class="option">
                    <p>Regular Temperature</p>
                    <p class="price">€3.99</p>
                </div>
                <div class="option">
                    <p>Higher Temperature</p>
                    <p class="price">€5.99</p>
                </div>
            </div>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="../asssets/images/heat_pack.png" class="heat-pack-img" alt="heat-pack">
            <h3>Heat Pack</h3>
            <div class="option-container">
                <div class="option">
                    <p>Regular Temperature</p>
                    <p class="price">€3.99</p>
                </div>
                <div class="option">
                    <p>Higher Temperature</p>
                    <p class="price">€5.99</p>
                </div>
            </div>
            <button class="buy-btn">Buy</button>
        </div>
    </div>

    <footer>
        <address>
            Contact Us:<br>
            Email:<a href="mailto:hello@thermaltouch.com">hello@thermaltouch.com</a><br>
            Phone:<a href="tel:+353">+353 (01) 234 5678</a>
        </address>
    </footer>
    <script src="../asssets/js/script.js" defer></script>

</html>
